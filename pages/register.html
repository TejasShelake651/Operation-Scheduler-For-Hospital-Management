<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration | MediSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background: var(--bg-base);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(at 0% 0%, hsla(221, 83%, 53%, 0.05) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(221, 83%, 53%, 0.05) 0, transparent 50%);
            padding: 2rem;
            margin: 0;
        }

        .register-container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 4rem;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-premium);
            position: relative;
            overflow: hidden;
        }

        .register-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 8px;
            background: linear-gradient(90deg, #2563eb, #10b981);
        }

        .register-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .register-header h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            color: var(--text-primary);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .full-width {
            grid-column: span 2;
        }

        .form-input-premium {
            width: 100%;
            height: 55px;
            padding: 0 1.5rem;
            border-radius: 12px;
            border: 2px solid var(--border);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.3s;
            background: #f8fafc;
            box-sizing: border-box;
        }

        .form-input-premium:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px var(--primary-soft);
        }

        .form-label-premium {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <div class="badge" style="background: rgba(16, 185, 129, 0.1); color: #10b981; margin-bottom: 1.5rem; font-weight: 800; padding: 8px 20px; border-radius: 100px;">NEW PATIENT ENROLLMENT</div>
            <h1>Create Your Portal</h1>
            <p style="color: var(--text-secondary); font-weight: 500;">Access your surgical records and institutional care data</p>
        </div>

        <form id="registerForm">
            <div class="form-grid">
                <div class="full-width">
                    <label class="form-label-premium">Patient Full Name</label>
                    <input type="text" class="form-input-premium" id="regName" placeholder="e.g. Robert Wilson" required>
                </div>
                <div>
                    <label class="form-label-premium">Institutional Email</label>
                    <input type="email" class="form-input-premium" id="regEmail" placeholder="robert@example.com" required>
                </div>
                <div>
                    <label class="form-label-premium">Phone Number</label>
                    <input type="tel" class="form-input-premium" id="regPhone" placeholder="+1 (555) 000-0000" required>
                </div>
                <div class="full-width">
                    <label class="form-label-premium">Access Passphrase</label>
                    <input type="password" class="form-input-premium" id="regPass" placeholder="••••••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; height: 60px; justify-content: center; font-size: 1.1rem; margin-top: 2.5rem; border-radius: 15px;">
                CREATE SECURE ACCOUNT <i class="fa-solid fa-user-plus" style="margin-left: 10px;"></i>
            </button>
        </form>

        <div style="margin-top: 2.5rem; text-align: center;">
            <p style="color: var(--text-secondary); font-weight: 500; font-size: 0.95rem;">Already have an account? <a href="login.html?role=patient" style="color: var(--primary); text-decoration: none; font-weight: 700;">Sign in here</a></p>
            <a href="../index.html" style="color: var(--text-muted); text-decoration: none; font-weight: 700; font-size: 0.9rem; display: block; margin-top: 2rem;">
                <i class="fa-solid fa-chevron-left" style="margin-right: 5px;"></i> Back to Landing Page
            </a>
        </div>
    </div>

    <script src="../js/main.js" type="module"></script>
    <script type="module">
        import { registerUser, addPatient } from '../js/firebase-service.js';
        import { logAction, ACTIONS } from '../js/logger.js';
        import { showToast } from '../js/main.js';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> INITIALIZING ACCOUNT...';
            btn.disabled = true;

            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const pass = document.getElementById('regPass').value;

            try {
                const userCredential = await registerUser(email, pass);
                await addPatient({
                    uid: userCredential.user.uid,
                    name,
                    email,
                    phone,
                    role: 'patient'
                });
                
                await logAction('USER_REGISTERED', email, { name, role: 'patient' });
                
                showToast('Registration Successful! Redirecting to login...', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html?role=patient';
                }, 1500);
            } catch (err) {
                showToast(err.message || 'Registration failure', 'danger');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
