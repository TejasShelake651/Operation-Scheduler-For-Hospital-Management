<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OT Rooms | MediSync Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="admin-layout">
        <header class="top-bar-premium">
            <div class="nav-brand">
                <div class="logo-icon"><i class="fa-solid fa-hospital-user text-white"></i></div>
                <span class="logo-text">MEDISYNC ADMIN</span>
            </div>
            
            <nav class="header-nav-group">
                <a href="admin-dashboard.html" class="header-link"><i class="fa-solid fa-gauge"></i> Dashboard</a>
                <a href="admin-doctors.html" class="header-link"><i class="fa-solid fa-user-doctor"></i> Doctors</a>
                <a href="admin-patients.html" class="header-link"><i class="fa-solid fa-hospital-user"></i> Patients</a>
                <a href="admin-scheduler.html" class="header-link"><i class="fa-solid fa-calendar-plus"></i> Scheduler</a>
                <a href="admin-rooms.html" class="header-link active"><i class="fa-solid fa-door-open"></i> OT Status</a>
                <a href="admin-analytics.html" class="header-link"><i class="fa-solid fa-chart-line"></i> Analytics</a>
            </nav>

            <div class="user-profile">
                <div class="admin-info" style="text-align: right; margin-right: 15px;">
                    <span class="admin-name">Master Command</span>
                    <span class="admin-role">Institutional Admin</span>
                </div>
                <img src="https://images.unsplash.com/photo-1559839734-2b71f1536783?auto=format&fit=crop&w=150&h=150&q=80" class="admin-avatar">
                <a href="../index.html" class="btn-icon" style="margin-left: 15px; border: none; background: var(--bg-base); color: var(--danger);"><i class="fa-solid fa-right-from-bracket"></i></a>
            </div>
        </header>

        <main class="main-wrap">
            <header class="page-header" style="margin-bottom: 3rem;">
                <div>
                    <h1 style="font-size: 2.5rem; letter-spacing: -1.5px; color: var(--text-primary);">Surgical Suite Monitoring</h1>
                    <p style="color: var(--text-secondary); font-size: 1.1rem; font-weight: 500;">Real-time environmental and occupancy tracking for internal OTs</p>
                </div>
                <button class="btn-primary" onclick="showToast('Refreshing Telemetry...', 'info')">
                    <i class="fa-solid fa-sync"></i> REFRESH TELEMETRY
                </button>
            </header>

            <div id="otCardsContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2.5rem; margin-bottom: 4rem;">
                <!-- Dynamic Cards -->
            </div>

            <section class="card-premium">
                <div class="card-header-premium">
                    <h3>Suite Inventory & Maintenance</h3>
                </div>
                <div class="table-container">
                    <table class="data-table-premium">
                        <thead>
                            <tr>
                                <th>Unit ID</th>
                                <th>Specialization</th>
                                <th>Floor / Wing</th>
                                <th>Status</th>
                                <th>Maintenance</th>
                            </tr>
                        </thead>
                        <tbody id="otTableBody">
                            <!-- Dynamic Table -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/main.js" type="module"></script>
    <script type="module">
        import { streamSurgeries } from '../js/firebase-service.js';
        
        const HOSPITAL_ROOMS = [
            { id: 'OT-01-A', spec: 'MODULAR', type: 'General', floor: 'L1, East Wing' },
            { id: 'OT-02-B', spec: 'CARDIAC SPECIALIZED', type: 'Cardiac', floor: 'L2, South Wing' },
            { id: 'OT-04-A', spec: 'NEURO / MODULAR', type: 'Neurosurgery', floor: 'L4, North Wing' }
        ];

        streamSurgeries((surgeries) => {
            // Find currently active surgeries (SCHEDULED, PENDING, QUEUED)
            const activeSurgeries = surgeries.filter(s => ['scheduled', 'pending', 'queued', 'in-progress'].includes(s.status?.toLowerCase()));
            
            const cardsContainer = document.getElementById('otCardsContainer');
            const tableBody = document.getElementById('otTableBody');
            
            let cardsHTML = '';
            let tableHTML = '';

            HOSPITAL_ROOMS.forEach(room => {
                // Check if this room is used in any active surgery
                const occupyingSurgery = activeSurgeries.find(s => s.otId && s.otId.includes(room.id));
                const isOccupied = !!occupyingSurgery;

                const statusBadge = isOccupied ? 
                    `<span class="status-badge occupied" style="background: hsla(0, 84%, 60%, 0.1); color: var(--danger);">OCCUPIED</span>` : 
                    `<span class="status-badge scheduled">AVAILABLE</span>`;

                const actionButton = isOccupied ? 
                    `<button class="btn-white" style="width: 100%; justify-content: center;" onclick="location.href='admin-dashboard.html'">MONITOR FEED (${occupyingSurgery.patientName})</button>` :
                    `<button class="btn-primary" style="width: 100%; justify-content: center;" onclick="location.href='admin-scheduler.html?room=${room.id}'">BOOK SUITE</button>`;

                cardsHTML += `
                <div class="card-premium" style="padding: 2rem; border-top: 5px solid ${isOccupied ? 'var(--danger)' : 'var(--success)'}">
                    <div class="flex-between" style="margin-bottom: 2rem;">
                        <div>
                            <h3 style="font-size: 1.25rem;">${room.id}</h3>
                            <p style="font-size: 0.75rem; color: var(--primary); font-weight: 800;">${room.spec}</p>
                        </div>
                        ${statusBadge}
                    </div>
                    <div style="padding: 1.5rem; background: var(--bg-base); border-radius: 15px; margin-bottom: 2rem;">
                        <div class="flex-between" style="margin-bottom: 10px;">
                            <span style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted);">TEMPERATURE</span>
                            <span style="font-weight: 800; color: var(--success);">${isOccupied ? '21.4°C' : '20.1°C'}</span>
                        </div>
                        <div class="flex-between">
                            <span style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted);">AIR PURITY</span>
                            <span style="font-weight: 800; color: var(--primary);">${isOccupied ? '99.2%' : '98.8%'}</span>
                        </div>
                    </div>
                    ${actionButton}
                </div>
                `;

                tableHTML += `
                <tr>
                    <td><span class="ot-badge">${room.id}</span></td>
                    <td>${room.type}</td>
                    <td>${room.floor}</td>
                    <td>${statusBadge}</td>
                    <td><span class="badge ${isOccupied ? 'badge-warning' : 'badge-success'}">${isOccupied ? 'IN USE' : 'READY'}</span></td>
                </tr>
                `;
            });

            cardsContainer.innerHTML = cardsHTML;
            tableBody.innerHTML = tableHTML;
        });
    </script>
</body>
</html>
