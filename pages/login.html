<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access | MediSync Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background: var(--bg-base);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(at 0% 0%, hsla(221, 83%, 53%, 0.05) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(221, 83%, 53%, 0.05) 0, transparent 50%);
            padding: 2rem;
            margin: 0;
            font-family: var(--font-main);
        }

        .login-container {
            width: 100%;
            max-width: 550px;
            background: white;
            padding: 4rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-premium);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 8px;
            background: linear-gradient(90deg, var(--primary), #6366f1);
        }

        .login-header {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .login-header h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-label-premium {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group-premium {
            position: relative;
            margin-bottom: 2rem;
        }

        .input-group-premium i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .form-input-premium {
            width: 100%;
            height: 60px;
            padding: 0 20px 0 55px;
            border-radius: 14px;
            border: 2px solid var(--border);
            font-family: var(--font-main);
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            transition: all 0.3s;
            background: var(--bg-base);
            box-sizing: border-box;
        }

        .form-input-premium:focus {
            border-color: var(--primary);
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px var(--primary-soft);
        }

        .form-input-premium:focus + i {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <main class="login-container">
        <div class="login-header">
            <div id="roleBadge" class="badge" style="background: var(--primary-soft); color: var(--primary); padding: 8px 20px; margin-bottom: 2rem; font-weight: 800; border-radius: 100px; display: inline-block;">
                INITIALIZING SYSTEM
            </div>
            <h1>Secure Access</h1>
            <p>MediSync Institutional Control System</p>
        </div>

        <form id="loginForm">
            <label class="form-label-premium" for="email">Professional ID / Email</label>
            <div class="input-group-premium">
                <i class="fa-solid fa-user-circle"></i>
                <input type="email" id="loginEmail" class="form-input-premium" placeholder="your@email.com" required>
            </div>

            <label class="form-label-premium">Encrypted Passphrase</label>
            <div class="input-group-premium">
                <i class="fa-solid fa-key"></i>
                <input type="password" id="loginPass" class="form-input-premium" placeholder="••••••••••••" autocomplete="current-password" required>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; height: 60px; justify-content: center; font-size: 1.1rem; margin-top: 1rem; border-radius: 12px;">
                INITIALIZE SECURE SESSION <i class="fa-solid fa-arrow-right-long" style="margin-left: 10px;"></i>
            </button>

            <div style="display: flex; align-items: center; margin: 2rem 0; gap: 15px;">
                <div style="flex: 1; height: 1px; background: var(--border);"></div>
                <span style="color: var(--text-muted); font-size: 0.8rem; font-weight: 700; text-transform: uppercase;">OR SIGN IN WITH</span>
                <div style="flex: 1; height: 1px; background: var(--border);"></div>
            </div>

            <button type="button" class="btn-primary" style="width: 100%; height: 60px; justify-content: center; background: white; color: var(--text-primary); border: 2px solid var(--border); box-shadow: none; border-radius: 12px;" onclick="window.showToast('Connecting to Secure Google Gateway...', 'info')">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/smartlock/google.svg" style="width: 20px; margin-right: 12px;" alt="Google">
                GOOGLE DIRECT ACCESS
            </button>
        </form>

        <div style="margin-top: 3.5rem; text-align: center;">
            <p id="regPrompt" style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem; font-weight: 500;">New to MediSync? <a href="register.html" style="color: var(--primary); text-decoration: none; font-weight: 700;">Create a patient account</a></p>
            <a href="../index.html" style="color: var(--primary); text-decoration: none; font-weight: 700; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s;" onmouseover="this.style.gap='15px'" onmouseout="this.style.gap='8px'">
                <i class="fa-solid fa-chevron-left"></i> Return to Enterprise Portal
            </a>
        </div>
    </main>

    <script src="../js/main.js" type="module"></script>
    <script type="module">
        import { loginUser } from '../js/firebase-service.js';
        import { logAction, ACTIONS } from '../js/logger.js';
        import { showToast } from '../js/main.js';

        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role') || 'admin';
        const badge = document.getElementById('roleBadge');

        if(role === 'user') {
            badge.innerHTML = 'CLINICIAN WORKSPACE';
            badge.style.background = 'hsla(150, 100%, 35%, 0.1)';
            badge.style.color = 'var(--success)';
        } else if(role === 'patient') {
            badge.innerHTML = 'PATIENT PORTAL ACCESS';
            badge.style.background = 'hsla(210, 100%, 50%, 0.1)';
            badge.style.color = 'var(--primary)';
            document.querySelector('.login-header p').innerHTML = 'Access your personal clinical records & schedule';
            document.querySelector('label[for="email"]').innerHTML = 'Patient Email / ID';
        } else {
            badge.innerHTML = 'ADMINISTRATION OVERRIDE';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ESTABLISHING ENCRYPTED LINK...';
            btn.disabled = true;

            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            
            try {
                // Real Auth
                await loginUser(email, pass);
                await logAction(ACTIONS.LOGIN, email, { role });

                showToast('Identity Verified! Redirecting...', 'success');
                setTimeout(() => {
                    if(role === 'admin') window.location.href = 'admin-dashboard.html';
                    else if(role === 'patient') window.location.href = 'patient-dashboard.html';
                    else window.location.href = 'user-dashboard.html';
                }, 1200);
            } catch (err) {
                showToast(err.message || 'Authentication failed', 'danger');
                btn.innerHTML = original;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
